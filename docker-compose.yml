services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-coi}
      DB_PASSWORD: ${DB_PASSWORD:-coi_password}
      DB_NAME: ${DB_NAME:-coi}
      DB_SSLMODE: disable
      ACCOUNT_ID: ${ACCOUNT_ID:?set ACCOUNT_ID}
      ACCESS_KEY_ID: ${ACCESS_KEY_ID:?set ACCESS_KEY_ID}
      SECRET_ACCESS_KEY: ${SECRET_ACCESS_KEY:?set SECRET_ACCESS_KEY}
      BUCKET_NAME: ${BUCKET_NAME:?set BUCKET_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_CONFIGURE_BUCKET_CORS: ${R2_CONFIGURE_BUCKET_CORS:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      JWT_ACCESS_SECRET_KEY: ${JWT_ACCESS_SECRET_KEY:-}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-coi}
      MYSQL_USER: ${DB_USER:-coi}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coi_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
